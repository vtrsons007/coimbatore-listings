<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Local Classifieds Notice Board</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Base Reset & Variables */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        :root {
            --primary: #0f172a;
            --primary-accent: #2563eb;
            --primary-light: #eff6ff;
            --border-color: rgba(226, 232, 240, 0.7);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-site: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.85);
            --shadow-sm: 0 2px 8px -1px rgba(15, 23, 42, 0.03), 0 1px 3px -1px rgba(15, 23, 42, 0.02);
            --shadow-md: 0 12px 24px -4px rgba(15, 23, 42, 0.04), 0 4px 12px -2px rgba(15, 23, 42, 0.02);
            --shadow-hover: 0 20px 32px -6px rgba(15, 23, 42, 0.08), 0 8px 20px -4px rgba(15, 23, 42, 0.04);
            --radius-card: 16px;
            --radius-input: 10px;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background-color: var(--bg-site);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Ambient Glassmorphism Blurred Background Blobs */
        .ambient-glow-1 {
            position: fixed; top: -100px; right: -50px; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, rgba(255,255,255,0) 70%);
            z-index: -1; filter: blur(40px); pointer-events: none;
        }
        .ambient-glow-2 {
            position: fixed; bottom: 10%, left: -100px; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(124,58,237,0.06) 0%, rgba(255,255,255,0) 70%);
            z-index: -1; filter: blur(50px); pointer-events: none;
        }

        /* Modern Landing Hero Block Canvas with Subtle Grid Pattern */
        header {
            background-color: var(--primary);
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 0);
            background-size: 24px 24px;
            color: white;
            padding: 50px 20px 70px 20px;
            text-align: center;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            font-size: 15px;
            color: #94a3b8;
            font-weight: 500;
        }

        /* Search & Filter Bar Container */
        .filter-container {
            max-width: 1200px;
            margin: -35px auto 35px auto;
            padding: 0 20px;
        }
        .filter-bar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .filter-controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
            align-items: center;
        }
        .filter-input {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-input);
            font-size: 14px;
            background-color: white;
            color: var(--text-main);
            font-weight: 500;
            outline: none;
            transition: all 0.2s ease;
        }
        .filter-input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .search-input { 
            flex: 1; 
            min-width: 240px; 
        }

        /* Modern Rounded Dynamic Pill Category Buttons Container */
        .pills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
            border-top: 1px solid var(--border-color);
            padding-top: 14px;
        }
        .pill-btn {
            border: 1px solid transparent;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            text-transform: capitalize;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pill-btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }
        
        /* Interactive Categories Design Color Theme Map */
        .pill-all { background: #f1f5f9; color: #475569; }
        .pill-all.active { background: #475569; color: white; }
        
        .pill-jobs { background: #eff6ff; color: #1d4ed8; }
        .pill-jobs.active, .badge-jobs { background: #1d4ed8; color: white; }
        
        .pill-property { background: #fffbeb; color: #b45309; }
        .pill-property.active, .badge-property { background: #b45309; color: white; }
        
        .pill-services { background: #f0fdf4; color: #15803d; }
        .pill-services.active, .badge-services { background: #15803d; color: white; }
        
        .pill-health { background: #f5f3ff; color: #6d28d9; }
        .pill-health.active, .badge-health { background: #6d28d9; color: white; }
        
        .pill-offers { background: #fff7ed; color: #c2410c; } 
        .pill-offers.active, .badge-offers { background: #c2410c; color: white; } 
        
        .pill-default { background: #f8fafc; color: #64748b; }
        .pill-default.active, .badge-default { background: #64748b; color: white; }

        /* Main Presentation Canvas Grid */
        main { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px; 
        }
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        /* 3D Depth Floating Card Elements Layout */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-card);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            scroll-margin-top: 40px;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(37, 99, 235, 0.2);
        }
        
        /* Direct URL Target Item Anchor Border Glow Flash */
        .card:target {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        .card-header { 
            padding: 18px 20px 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .badge { 
            font-size: 11px; 
            font-weight: 700; 
            padding: 5px 12px; 
            border-radius: 6px; 
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .posted-date { 
            font-size: 12px; 
            color: var(--text-muted); 
            font-weight: 600; 
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Modern Vector Share Utility Handle icon button styling */
        .btn-share {
            background: white;
            border: 1px solid var(--border-color);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }
        .btn-share:hover {
            background: var(--primary-light);
            color: var(--primary-accent);
            border-color: rgba(37, 99, 235, 0.2);
        }

        .card-body { 
            padding: 0 20px 20px 20px; 
            flex-grow: 1; 
        }
        .card-title { 
            font-size: 18px; 
            font-weight: 700; 
            margin-bottom: 4px; 
            line-height: 1.3;
            color: #1e293b;
        }
        .card-subtitle { 
            font-size: 13px; 
            color: var(--primary-accent); 
            margin-bottom: 14px; 
            font-weight: 600;
        }
        
        /* Card Data Parameter Spec Blocks */
        .card-details {
            font-size: 13.5px; 
            background: rgba(248, 250, 252, 0.7); 
            padding: 12px;
            border-radius: 10px; 
            margin-bottom: 14px; 
            border-left: 3px solid #cbd5e1;
            color: #334155;
        }
        .card-details p { margin-bottom: 5px; }
        .card-details p:last-child { margin-bottom: 0; }
        
        /* Regional Text Sub-Accent block layout styles */
        .lang-tamil {
            font-size: 13px; 
            color: #475569; 
            background: #fffbeb;
            padding: 8px 12px; 
            border-radius: 8px; 
            border: 1px dashed #fde68a;
            margin-top: 10px;
            font-weight: 500;
        }
        
        .card-footer {
            padding: 14px 20px; 
            background: rgba(248, 250, 252, 0.5);
            border-top: 1px solid var(--border-color);
        }
        .footer-actions {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 10px;
        }
        .phone-link { 
            color: #16a34a; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 14.5px; 
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .phone-link:hover { text-decoration: underline; }
        
        .btn-action { 
            background: var(--primary-accent); 
            color: white; 
            padding: 8px 16px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }
        .btn-action:hover { 
            background-color: #1d4ed8;
            box-shadow: 0 6px 12px -2px rgba(37, 99, 235, 0.3);
        }

        .takedown-note {
            display: block;
            font-size: 11px;
            color: #94a3b8;
            text-decoration: none;
            text-align: center;
            border-top: 1px dashed #e2e8f0;
            padding-top: 8px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .takedown-note:hover {
            color: #ef4444; 
            text-decoration: underline;
        }

        /* Smooth Paginated Chunk Button Layout controls */
        .load-more-container {
            text-align: center;
            margin: 30px 0 50px 0;
        }
        .btn-load-more {
            background-color: white;
            color: var(--primary-accent);
            border: 2px solid var(--primary-accent);
            padding: 12px 36px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }
        .btn-load-more:hover {
            background-color: var(--primary-accent);
            color: white;
            box-shadow: 0 8px 16px -4px rgba(37, 99, 235, 0.3);
        }

        /* Floating glass sliding notification prompt alert box */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: white; padding: 14px 28px; border-radius: 30px;
            font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 640px) {
            header { padding: 40px 16px 60px 16px; }
            header h1 { font-size: 26px; }
            .filter-bar { padding: 16px; }
            .filter-controls-row { flex-direction: column; align-items: stretch; }
            .listings-grid { grid-template-columns: 1fr; gap: 20px; }
            .pills-container { justify-content: flex-start; overflow-x: auto; padding-bottom: 4px; }
            .pill-btn { padding: 6px 16px; font-size: 12px; flex-shrink: 0; }
        }
    </style>
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <header>
        <h1>Local Digital Classifieds</h1>
        <p>Your beautiful, dynamic local notice board and marketplace</p>
    </header>

    <div class="filter-container">
        <div class="filter-bar">
            <div class="filter-controls-row">
                <input type="text" id="searchBox" class="filter-input search-input" placeholder="Search categories, titles, or locations...">
                <input type="date" id="dateFilter" class="filter-input" title="Filter by specific day">
                <select id="monthSelector" class="filter-input" style="font-weight: 600;">
                    <option value="2026-06">June 2026</option>
                    <option value="2026-05">May 2026</option>
                    <option value="2026-04">April 2026</option>
                </select>
                <button id="clearFilters" class="btn-action" style="background:#64748b; box-shadow:none; height: 44px;">Reset Filters</button>
            </div>

            <div class="pills-container" id="pillsContainer"></div>
        </div>
    </div>

    <main>
        <div id="listingsGrid" class="listings-grid"></div>
        <div class="load-more-container">
            <button id="loadMoreBtn" class="btn-load-more" style="display: none;">Load More Listings</button>
        </div>
    </main>

    <div id="shareToast" class="toast">
        <i data-lucide="check-circle" width="18" height="18"></i> Link copied to clipboard!
    </div>

    <script>
        let allListings = [];
        let filteredListings = [];
        let itemsRendered = 0;
        let activeCategory = ""; 
        const ITEMS_PER_PAGE = 20; 
        
        const KNOWN_CATEGORIES = ['jobs', 'property', 'services', 'health', 'offers'];
        const currentYearMonth = new Date().toISOString().slice(0, 7); 
        
        const monthSelectorEl = document.getElementById('monthSelector');
        if (Array.from(monthSelectorEl.options).some(option => option.value === currentYearMonth)) {
            monthSelectorEl.value = currentYearMonth;
        }

        async function loadListings(yearMonth) {
            const grid = document.getElementById('listingsGrid');
            document.getElementById('loadMoreBtn').style.display = 'none';
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:40px; color:#64748b; font-weight:500;">Loading notice board items...</p>';

            try {
                const response = await fetch(`data/${yearMonth}.json`);
                if (!response.ok) throw new Error(`File data/${yearMonth}.json not available.`);
                
                allListings = await response.json();
                generateCategoryPills();

                if(window.location.hash) {
                    filteredListings = [...allListings];
                    renderListingsChunks(true); 
                    const targetCard = document.querySelector(window.location.hash);
                    if(targetCard) setTimeout(() => targetCard.scrollIntoView({ behavior: 'smooth' }), 300);
                } else {
                    filterListings(); 
                }
            } catch (error) {
                console.error(error);
                grid.innerHTML = `
                    <p style="grid-column:1/-1; text-align:center; padding:40px; color:#dc2626; font-weight:600;">
                        No dataset loaded for "${yearMonth}".
                    </p>`;
            }
        }

        function generateCategoryPills() {
            const container = document.getElementById('pillsContainer');
            const uniqueCategories = new Set();

            allListings.forEach(item => {
                if (item.category) uniqueCategories.add(item.category.trim().toLowerCase());
            });

            let pillsHTML = `<button class="pill-btn pill-all ${activeCategory === '' ? 'active' : ''}" onclick="selectCategory('', this)">All</button>`;

            uniqueCategories.forEach(cat => {
                const themeClass = KNOWN_CATEGORIES.includes(cat) ? `pill-${cat}` : 'pill-default';
                if(activeCategory === cat) {
                    pillsHTML += `<button class="pill-btn ${themeClass} active" onclick="selectCategory('${cat}', this)">${cat}</button>`;
                } else {
                    pillsHTML += `<button class="pill-btn ${themeClass}" onclick="selectCategory('${cat}', this)">${cat}</button>`;
                }
            });

            container.innerHTML = pillsHTML;
        }

        function renderListingsChunks(renderAll = false) {
            const grid = document.getElementById('listingsGrid');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            
            if (itemsRendered === 0) grid.innerHTML = '';

            const start = itemsRendered;
            const end = renderAll ? filteredListings.length : Math.min(start + ITEMS_PER_PAGE, filteredListings.length);
            const chunk = filteredListings.slice(start, end);

            chunk.forEach(item => {
                let detailsHTML = '';
                if (item.details) {
                    for (const [key, value] of Object.entries(item.details)) {
                        detailsHTML += `<p><strong>${key}:</strong> ${value}</p>`;
                    }
                }

                const safeTitle = (item.title || '').replace(/'/g, "\\'");
                const safeCompany = (item.company || '').replace(/'/g, "\\'");
                const adminEmail = "admin@yourdomain.com"; 
                const emailSubject = encodeURIComponent(`Takedown Request: ID ${item.id}`);
                const emailBody = encodeURIComponent(`Please remove Listing ID: ${item.id}\nTitle: ${item.title}`);
                const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(item.company)}`;

                const currentCatLower = (item.category || '').trim().toLowerCase();
                const badgeThemeClass = KNOWN_CATEGORIES.includes(currentCatLower) ? `badge-${currentCatLower}` : 'badge-default';

                const card = document.createElement('article');
                card.className = 'card';
                card.id = `card-${item.id}`;
                card.innerHTML = `
                    <div class="card-header">
                        <span class="badge ${badgeThemeClass}">${item.category}</span>
                        <div class="header-right">
                            <span class="posted-date"><i data-lucide="calendar" width="14" height="14"></i> ${item.datePosted}</span>
                            <button class="btn-share" onclick="shareAd('${item.id}', '${safeTitle}', '${safeCompany}')" title="Share Listing">
                                <i data-lucide="share-2" width="15" height="15"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <h2 class="card-title">${item.title}</h2>
                        <div class="card-subtitle">${item.company}</div>
                        ${detailsHTML ? `<div class="card-details">${detailsHTML}</div>` : ''}
                        ${item.regionalText ? `<div class="lang-tamil">${item.regionalText}</div>` : ''}
                    </div>
                    <div class="card-footer">
                        <div class="footer-actions">
                            <a href="tel:${item.phone.replace(/\s+/g, '')}" class="phone-link"><i data-lucide="phone" width="15" height="15"></i> ${item.phone}</a>
                            <a href="${googleSearchUrl}" target="_blank" rel="noopener noreferrer" class="btn-action">
                                Search <i data-lucide="external-link" width="13" height="13"></i>
                            </a>
                        </div>
                        <a href="mailto:${adminEmail}?subject=${emailSubject}&body=${emailBody}" class="takedown-note">
                            Are you the owner? Click to request update or removal.
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });

            itemsRendered = end;
            loadMoreBtn.style.display = (itemsRendered >= filteredListings.length) ? 'none' : 'inline-block';
            
            // Re-trigger icon engine evaluation pass loops to parse newly appended dynamic card nodes
            lucide.createIcons();
        }

        function selectCategory(categoryValue, element) {
            activeCategory = categoryValue;
            document.querySelectorAll('.pill-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            filterListings();
        }

        function filterListings() {
            const searchVal = document.getElementById('searchBox').value.toLowerCase();
            const dateVal = document.getElementById('dateFilter').value;

            filteredListings = allListings.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(searchVal) || 
                                      item.company.toLowerCase().includes(searchVal) ||
                                      (item.regionalText && item.regionalText.toLowerCase().includes(searchVal));
                
                const currentItemCat = (item.category || '').trim().toLowerCase();
                const matchesCat = activeCategory === "" || currentItemCat === activeCategory;
                const matchesDate = dateVal === "" || item.datePosted === dateVal;
                return matchesSearch && matchesCat && matchesDate;
            });

            itemsRendered = 0; 
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const grid = document.getElementById('listingsGrid');
            if (filteredListings.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding:50px; color:#64748b; font-weight:500;">No matching notices found.</p>';
                document.getElementById('loadMoreBtn').style.display = 'none';
                return;
            }

            renderListingsChunks();
        }

        document.getElementById('loadMoreBtn').addEventListener('click', () => renderListingsChunks());

        async function shareAd(id, title, company) {
            const shareUrl = `${window.location.origin}${window.location.pathname}#card-${id}`;
            const shareText = `Classified Notice: "${title}" by ${company}. View parameters here:`;

            if (navigator.share) {
                try {
                    await navigator.share({ title: title, text: shareText, url: shareUrl });
                } catch (err) { console.log("Cancelled share."); }
            } else {
                try {
                    await navigator.clipboard.writeText(shareUrl);
                    showToast();
                } catch (err) { alert("Link: " + shareUrl); }
            }
        }

        function showToast() {
            const toast = document.getElementById('shareToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.getElementById('searchBox').addEventListener('input', filterListings);
        document.getElementById('dateFilter').addEventListener('change', filterListings);
        
        document.getElementById('monthSelector').addEventListener('change', (e) => {
            document.getElementById('dateFilter').value = ''; 
            activeCategory = '';
            loadListings(e.target.value);
        });

        document.getElementById('clearFilters').addEventListener('click', () => {
            document.getElementById('searchBox').value = '';
            document.getElementById('dateFilter').value = '';
            selectCategory('', document.querySelector('.pill-all'));
        });

        window.onload = () => {
            loadListings(document.getElementById('monthSelector').value);
        };
    </script>
</body>
</html>
